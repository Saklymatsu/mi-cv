<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilustraciones</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #5a001f;
            color: white;
        }

        /* NAVBAR */
        header {
            background-color: #6e3a52;
            padding: 15px 0;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        nav a {
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        /* CONTENIDO */
        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        /* GRID  */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 columnas */
            gap: 20px;
        }

        /* TARJETAS */
        .item {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .item img {
            width: 100%;
            border-radius: 10px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>

<body>

    <!-- MENÚ -->
    <header>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="sobre-mi.html">Acerca de mí</a>
            <a href="portafolio.html">Portafolio</a>
        </nav>
    </header>

    <!-- CONTENIDO -->
    <div class="container">
        <h1>Ilustraciones</h1>

        <div class="grid">

            <div class="item">
                <img src="img/il1.jpeg" alt="Proyecto 1">
            </div>

            <div class="item">
                <img src="img/il2.jpeg" alt="Proyecto 2">
            </div>

            <div class="item">
                <img src="img/il3.jpeg" alt="Proyecto 3">
            </div>

            <div class="item">
                <img src="img/il4.jpeg" alt="Proyecto 4">
            </div>

            <div class="item">
                <img src="img/il5.jpeg" alt="Proyecto 5">
            </div>

            <div class="item">
                <img src="img/il6.jpeg" alt="Proyecto 6">
            </div>

        </div>

    </div>

</body>
</html>
